<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>方案三局部对照</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; color: #f4f1ea; background: #101713; font-family: sans-serif; }
      main { display: grid; grid-template-columns: repeat(2, 373px); gap: 28px; padding-top: 36px; }
      figure { position: relative; width: 373px; height: 1013px; margin: 0; overflow: hidden; }
      figcaption { position: absolute; z-index: 2; top: -36px; left: 0; height: 36px; padding: 8px 12px; font-size: 14px; font-weight: 700; }
      img { position: absolute; inset: 0 auto auto 0; width: 1553px; height: 1013px; max-width: none; }
    </style>
  </head>
  <body>
    <main>
      <figure><figcaption>设计参考·侧边栏</figcaption><img src="../sidebar-option-3.png" alt="参考侧边栏" /></figure>
      <figure><figcaption>当前实现·侧边栏</figcaption><img src="sidebar-option-3-desktop.png" alt="实现侧边栏" /></figure>
    </main>
  </body>
</html>
