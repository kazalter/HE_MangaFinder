services:
  mangafinder:
    image: mangafinder:local
    build:
      context: .
      # Dockge 使用宿主机已构建的 Web 产物，避免在家用服务器重复安装 Node 工具链。
      dockerfile: Dockerfile.dockge
    ports:
      - "${MANGAFINDER_PORT:-8000}:8000"
    environment:
      MANGAFINDER_DATABASE_URL: sqlite:////app/data/mangafinder.db
      MANGAFINDER_DOWNLOADS_DIR: /app/data/downloads
      MANGAFINDER_COVER_CACHE_DIR: /app/data/cover-cache
      MANGAFINDER_CHAPTER_LANGUAGES: ${MANGAFINDER_CHAPTER_LANGUAGES:-zh-hans,zh-hant,en,ja}
      MANGAFINDER_USE_DATA_SAVER: ${MANGAFINDER_USE_DATA_SAVER:-true}
      MANGAFINDER_USER_AGENT: ${MANGAFINDER_USER_AGENT:-MangaFinder/0.1}
      MANGAFINDER_WNACG_BASE_URLS: ${MANGAFINDER_WNACG_BASE_URLS:-https://www.wnacg.com,https://www.wn08.cfd,https://www.wn07.cfd,https://www.wn08.shop,https://www.wn07.shop}
      MANGAFINDER_WNACG_COOKIE: ${MANGAFINDER_WNACG_COOKIE:-}
      MANGAFINDER_WNACG_MAX_SEARCH_PAGES: ${MANGAFINDER_WNACG_MAX_SEARCH_PAGES:-5}
      MANGAFINDER_NHENTAI_ENABLED: ${MANGAFINDER_NHENTAI_ENABLED:-true}
      MANGAFINDER_NHENTAI_BASE_URL: ${MANGAFINDER_NHENTAI_BASE_URL:-https://nhentai.net}
      MANGAFINDER_NHENTAI_PROXY_URL: ${MANGAFINDER_NHENTAI_PROXY_URL:-}
      MANGAFINDER_NHENTAI_COOKIE: ${MANGAFINDER_NHENTAI_COOKIE:-}
      MANGAFINDER_NHENTAI_MAX_SEARCH_PAGES: ${MANGAFINDER_NHENTAI_MAX_SEARCH_PAGES:-10}
      # Agent 默认关闭且只返回审核建议。模型可运行在宿主机、同一 Docker 网络或云端。
      MANGAFINDER_AGENT_ENABLED: ${MANGAFINDER_AGENT_ENABLED:-false}
      MANGAFINDER_AGENT_PROVIDER: ${MANGAFINDER_AGENT_PROVIDER:-openai_compatible}
      MANGAFINDER_AGENT_BASE_URL: ${MANGAFINDER_AGENT_BASE_URL:-http://host.docker.internal:11434/v1}
      MANGAFINDER_AGENT_MODEL: ${MANGAFINDER_AGENT_MODEL:-}
      MANGAFINDER_AGENT_API_KEY: ${MANGAFINDER_AGENT_API_KEY:-}
      MANGAFINDER_AGENT_TEMPERATURE: ${MANGAFINDER_AGENT_TEMPERATURE:-0}
      MANGAFINDER_AGENT_TIMEOUT_SECONDS: ${MANGAFINDER_AGENT_TIMEOUT_SECONDS:-60}
      MANGAFINDER_AGENT_MAX_REVIEWS_PER_RUN: ${MANGAFINDER_AGENT_MAX_REVIEWS_PER_RUN:-20}
      MANGAFINDER_AGENT_REVIEW_AFTER_DISCOVERY: ${MANGAFINDER_AGENT_REVIEW_AFTER_DISCOVERY:-false}
      MANGAFINDER_AGENT_AUTO_APPLY: ${MANGAFINDER_AGENT_AUTO_APPLY:-false}
      MANGAFINDER_AGENT_AUTO_APPLY_THRESHOLD: ${MANGAFINDER_AGENT_AUTO_APPLY_THRESHOLD:-0.98}
      MANGAFINDER_AGENT_ALLOW_CLOUD_IMAGES: ${MANGAFINDER_AGENT_ALLOW_CLOUD_IMAGES:-false}
      MANGAFINDER_AGENT_PROMPT_VERSION: ${MANGAFINDER_AGENT_PROMPT_VERSION:-v7}
      # 作者动态雷达：X 页面采集在隔离容器中运行，主应用只拿标准化数据。
      MANGAFINDER_SOCIAL_ENABLED: ${MANGAFINDER_SOCIAL_ENABLED:-false}
      MANGAFINDER_SOCIAL_COLLECTOR_BASE_URL: http://social-collector:8010
      MANGAFINDER_SOCIAL_COLLECTOR_TOKEN: ${MANGAFINDER_SOCIAL_COLLECTOR_TOKEN:-}
      MANGAFINDER_SOCIAL_SYNC_INTERVAL_MINUTES: ${MANGAFINDER_SOCIAL_SYNC_INTERVAL_MINUTES:-120}
      MANGAFINDER_SOCIAL_EVENT_SYNC_INTERVAL_MINUTES: ${MANGAFINDER_SOCIAL_EVENT_SYNC_INTERVAL_MINUTES:-30}
      MANGAFINDER_SOCIAL_INITIAL_BACKFILL_DAYS: ${MANGAFINDER_SOCIAL_INITIAL_BACKFILL_DAYS:-90}
      MANGAFINDER_SOCIAL_MAX_POSTS_PER_SYNC: ${MANGAFINDER_SOCIAL_MAX_POSTS_PER_SYNC:-100}
      MANGAFINDER_SOCIAL_AGENT_ENABLED: ${MANGAFINDER_SOCIAL_AGENT_ENABLED:-true}
      MANGAFINDER_SOCIAL_AGENT_PROMPT_VERSION: ${MANGAFINDER_SOCIAL_AGENT_PROMPT_VERSION:-social-zh-v2}
      MANGAFINDER_SOCIAL_AUTO_CONFIRM_THRESHOLD: ${MANGAFINDER_SOCIAL_AUTO_CONFIRM_THRESHOLD:-0.92}
      MANGAFINDER_SOCIAL_CANDIDATE_THRESHOLD: ${MANGAFINDER_SOCIAL_CANDIDATE_THRESHOLD:-0.60}
      MANGAFINDER_SOCIAL_MEDIA_DIR: /app/data/social-media
      MANGAFINDER_SOCIAL_OCR_ENABLED: ${MANGAFINDER_SOCIAL_OCR_ENABLED:-true}
      MANGAFINDER_SOCIAL_OCR_MAX_POSTS_PER_SYNC: ${MANGAFINDER_SOCIAL_OCR_MAX_POSTS_PER_SYNC:-12}
      MANGAFINDER_SOCIAL_OCR_TIMEOUT_SECONDS: ${MANGAFINDER_SOCIAL_OCR_TIMEOUT_SECONDS:-30}
      MANGAFINDER_PUBLIC_BASE_URL: ${MANGAFINDER_PUBLIC_BASE_URL:-http://localhost:8000}
      # QQ 官方机器人只发送纯文字，不发送成人封面。
      MANGAFINDER_QQ_BOT_ENABLED: ${MANGAFINDER_QQ_BOT_ENABLED:-false}
      MANGAFINDER_QQ_BOT_APP_ID: ${MANGAFINDER_QQ_BOT_APP_ID:-}
      MANGAFINDER_QQ_BOT_CLIENT_SECRET: ${MANGAFINDER_QQ_BOT_CLIENT_SECRET:-}
      MANGAFINDER_QQ_BOT_USER_OPENID: ${MANGAFINDER_QQ_BOT_USER_OPENID:-}
      TZ: ${TZ:-Etc/UTC}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - clash_proxy
    volumes:
      - ${MANGAFINDER_DATA_DIR:-./data}:/app/data
      # 下载文件可以单独放到大容量 HDD；容器内路径保持不变。
      - ${MANGAFINDER_DOWNLOADS_HOST_DIR:-./data/downloads}:/app/data/downloads
      # 第三方封面通过服务端代理后缓存在大容量盘，浏览器只访问同源 API。
      - ${MANGAFINDER_COVER_CACHE_HOST_DIR:-./data/cover-cache}:/app/data/cover-cache
      - ${MANGAFINDER_SOCIAL_MEDIA_HOST_DIR:-./data/social-media}:/app/data/social-media
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    init: true
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    restart: unless-stopped

  social-collector:
    profiles: ["social"]
    image: mangafinder-social-collector:local
    build:
      context: .
      dockerfile: Dockerfile.social-collector
    environment:
      SOCIAL_COLLECTOR_TOKEN: ${MANGAFINDER_SOCIAL_COLLECTOR_TOKEN:-}
      SOCIAL_COLLECTOR_STORAGE_STATE: /session/storage-state.json
      SOCIAL_COLLECTOR_RUNTIME_STATE: /session/runtime-state.json
      SOCIAL_COLLECTOR_HEADLESS: "true"
      SOCIAL_COLLECTOR_PROXY_URL: ${MANGAFINDER_X_PROXY_URL:-}
      SOCIAL_COLLECTOR_USER_AGENT: ${MANGAFINDER_X_USER_AGENT:-}
      SOCIAL_COLLECTOR_CHROMIUM_EXECUTABLE: /usr/bin/chromium
      TZ: Asia/Tokyo
    networks:
      - default
      - clash_proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${MANGAFINDER_X_SESSION_HOST_DIR:-./data/x-session}:/session
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os,urllib.request;
          r=urllib.request.Request('http://127.0.0.1:8010/health',headers={'Authorization':'Bearer '+os.getenv('SOCIAL_COLLECTOR_TOKEN','')});
          urllib.request.urlopen(r,timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    init: true
    shm_size: 1gb
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  clash_proxy:
    external: true
    name: ${MANGAFINDER_PROXY_NETWORK:-he-manager_default}
